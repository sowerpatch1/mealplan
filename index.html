<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1 Cholesterol-Friendly Meal Plan</title>
  <style>
    :root {
      --forest-900: #0f3527;
      --forest-800: #144130;
      --forest-700: #1b5a42;
      --forest-600: #236a4f;
      --sage-100: #edf4ef;
      --surface: #f6f5f2;
      --card: #ffffff;
      --ink: #173126;
      --ink-soft: #4a5a52;
      --protein-bg: #1e4e92;
      --protein-text: #f5f9ff;
      --chip-bg: #f0f3f1;
      --chip-border: #d5dfd9;
      --line: #dde6e0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--surface);
      color: var(--ink);
      line-height: 1.5;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 14px 36px;
    }

    .hero {
      background: linear-gradient(160deg, var(--forest-900), var(--forest-700));
      color: #f3f7f4;
      margin: 0 -14px;
      padding: 26px 18px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .hero-eyebrow {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 3.8vw, 42px);
      line-height: 1.15;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    .hero-sub {
      margin: 10px 0 0;
      color: #dbe8e0;
      font-size: 17px;
    }

    .hero-points {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: #d5e4dc;
    }

    .week-tabs,
    .day-tabs {
      margin: 0 -14px;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .week-tabs::-webkit-scrollbar,
    .day-tabs::-webkit-scrollbar {
      display: none;
    }

    .week-tabs {
      background: var(--forest-800);
    }

    .day-tabs {
      background: var(--forest-700);
    }

    .week-tab,
    .day-tab {
      border: none;
      background: transparent;
      color: #d3e2da;
      font-size: 15px;
      padding: 13px 18px;
      white-space: nowrap;
    }

    .week-tab.active,
    .day-tab.active {
      color: #ffffff;
      border-bottom: 3px solid #9fd4b7;
      font-weight: 600;
    }

    .content {
      padding-top: 16px;
    }

    .day-section {
      margin-bottom: 24px;
    }

    .day-section.hidden {
      display: none;
    }

    .day-title {
      margin: 0 0 10px;
      font-size: 38px;
      color: #26382f;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    .day-divider {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0 0 14px;
    }

    .meal-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #e6ece8;
      border-left: 4px solid var(--forest-600);
      padding: 14px 14px 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }

    .meal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .meal-type {
      color: #6e8077;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      font-weight: 600;
    }

    .protein-pill {
      background: var(--protein-bg);
      color: var(--protein-text);
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meal-name a,
    .meal-name .meal-title-text {
      color: #173126;
      text-decoration: none;
      font-size: 33px;
      line-height: 1.2;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 6px;
    }

    .meal-name a:hover {
      text-decoration: underline;
    }

    .meal-hint {
      margin: 0 0 10px;
      color: var(--ink-soft);
      font-size: 17px;
    }

    .meal-ingredients {
      margin: 0 0 10px;
      color: #5a6a63;
      font-size: 13px;
      text-transform: lowercase;
    }

    .meal-macros {
      margin: 0 0 10px;
      font-size: 12px;
      color: #4d5c55;
      line-height: 1.45;
    }

    .meal-macros strong {
      color: #2d3d36;
      font-weight: 600;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: #3d4f46;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .section-footer {
      margin-top: 14px;
      color: #3f4f48;
      font-size: 14px;
      background: var(--sage-100);
      border: 1px solid #d8e3dc;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .nutrition-card {
      margin-top: 14px;
      background: #ffffff;
      border: 1px solid #e2e8e4;
      border-radius: 14px;
      padding: 12px;
    }

    .nutrition-top {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .nutrition-box {
      background: #f5f8f6;
      border: 1px solid #e3ebe6;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      color: #587066;
    }

    .nutrition-box strong {
      float: right;
      color: #213a30;
      font-size: 26px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1;
    }

    .mini-heading {
      margin: 10px 0 7px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #587066;
      font-weight: 700;
    }

    .protein-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    @media (min-width: 640px) {
      .protein-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .protein-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid #e3ebe6;
      background: #f8faf9;
      border-radius: 9px;
      padding: 6px 8px;
      font-size: 14px;
      color: #3b5148;
    }

    .metric {
      margin-bottom: 8px;
    }

    .metric-line {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #33453d;
      margin-bottom: 3px;
    }

    .metric-bar {
      height: 7px;
      background: #e4e7e5;
      border-radius: 999px;
      overflow: hidden;
    }

    .metric-bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .badges {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .goal-badge {
      border: 1px solid #d9e4dd;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 13px;
      color: #335047;
      background: #f6faf7;
    }

    .goal-badge.warn {
      border-color: #e8d8bf;
      background: #fff7ea;
      color: #7d5b2a;
    }

    .protein-note {
      border: 1px solid #eadfc9;
      background: #fffbf1;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: #5b4a2f;
    }

    @media (max-width: 800px) {
      .day-title {
        font-size: 34px;
      }

      .meal-name a,
      .meal-name .meal-title-text {
        font-size: 30px;
      }
    }

    @media (max-width: 600px) {
      .day-title {
        font-size: 24px;
      }

      .meal-name a,
      .meal-name .meal-title-text {
        font-size: 16px;
      }

      .meal-hint {
        font-size: 14px;
      }

      .meal-ingredients {
        font-size: 12px;
      }

      .meal-macros {
        font-size: 11px;
      }

      .hero {
        padding-top: 20px;
      }

      .hero h1 {
        font-size: 38px;
      }

      .hero-sub {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-eyebrow">4-Week Program</div>
      <h1>Week 1 Cholesterol-Friendly Meal Plan</h1>
      <p class="hero-sub">
        Targets ~2000 kcal · ~100g protein (estimates) · USDA-style portions · two snacks · Fresh fish at dinner · Lunch &amp; dinner: cook once, eat next day (Sun pairs with Mon week 2)
      </p>
      <div class="hero-points">
        <span>🍲 Cook double</span>
        <span>♻️ Leftovers built in</span>
        <span>🐟 Fresh fish at dinner only</span>
      </div>
    </section>

    <nav class="week-tabs" aria-label="Week tabs">
      <button class="week-tab active" type="button">Week 1</button>
      <button class="week-tab" type="button">Week 2</button>
      <button class="week-tab" type="button">Week 3</button>
      <button class="week-tab" type="button">Week 4</button>
    </nav>

    <nav class="day-tabs" id="dayTabs" aria-label="Day tabs"></nav>

    <section class="content" id="planContainer"></section>
  </main>

  <script>
    /**
     * Per-meal nutrition: sums of typical USDA FoodData Central values for the listed portions
     * (e.g. oats, fish, legumes, dairy). Round to sensible precision; sodium includes estimated salt in soups/sauces.
     */
    const WKOATS = { calories: 512, protein: 18, carbs: 61, fat: 25, satFat: 4, fiber: 17, sodium: 110 };

    const weekdayBreakfast = {
      name: "Steel-Cut Oats Bowl (Weekday)",
      ingredients: "1/3 cup steel-cut oats (dry), 1/2 apple, 1 tbsp chia, 1 tbsp flaxseed meal, 1 tbsp almonds, 1 tbsp peanut butter, coffee + 1/4 cup lowfat milk",
      link: "https://cookieandkate.com/steel-cut-oatmeal-recipe/",
      nutrition: WKOATS
    };

    const satEggs = {
      name: "Veggie Egg Scramble + Toast",
      ingredients: "1 whole egg + 2/3 cup egg whites, 1/2 cup bell pepper + mushrooms, 1 slice whole grain toast, 2 tsp olive oil, coffee + 1/4 cup lowfat milk",
      link: "https://www.eatingwell.com/recipe/252451/veggie-egg-white-scramble/",
      nutrition: { calories: 285, protein: 23, carbs: 26, fat: 12, satFat: 3, fiber: 4, sodium: 380 }
    };

    const sunEggs = {
      name: "Open-Faced Egg & Avocado Toast",
      ingredients: "1 whole egg + 1/2 cup egg whites, 1 slice whole grain bread, 2 tbsp avocado, 1/3 tomato, coffee + 1/4 cup lowfat milk",
      link: "https://www.eatingwell.com/recipe/273978/avocado-toast-with-burrata/",
      nutrition: { calories: 265, protein: 21, carbs: 22, fat: 13, satFat: 3, fiber: 5, sodium: 410 }
    };

    /** Shared nutrition for cook + leftover pairs (do not edit one without the other). */
    const N = {
      monWedSnack: { calories: 235, protein: 22, carbs: 26, fat: 4, satFat: 2, fiber: 2, sodium: 120 },
      monWedSnack2: { calories: 188, protein: 19, carbs: 7, fat: 2.5, satFat: 1, fiber: 0, sodium: 490 },
      thuFriSnack: { calories: 210, protein: 20, carbs: 12, fat: 4, satFat: 1, fiber: 0, sodium: 110 },
      thuFriSnack2: { calories: 218, protein: 18, carbs: 14, fat: 7.5, satFat: 0.5, fiber: 4, sodium: 280 },
      weekendSnack: { calories: 328, protein: 24, carbs: 28, fat: 7, satFat: 1.5, fiber: 3, sodium: 150 },
      weekendSnack2: { calories: 327, protein: 24, carbs: 26, fat: 6.5, satFat: 1.5, fiber: 3, sodium: 340 },
      sunSnack: { calories: 330, protein: 21, carbs: 28, fat: 10, satFat: 1.5, fiber: 4, sodium: 140 },
      sunSnack2: { calories: 330, protein: 21, carbs: 26, fat: 9, satFat: 1, fiber: 3, sodium: 95 }
    };

    const monLunch = {
      name: "Thai Peanut Quinoa Salad",
      ingredients: "1/3 cup quinoa (dry), cooked; 3/4 cup chickpeas; 1.5 cups shredded cabbage + carrot slaw; dressing: 1.5 tbsp natural peanut butter, 1.5 tsp soy sauce, lime, ginger (recipe: Cookie and Kate). Cook once → eat Tuesday lunch.",
      link: "https://cookieandkate.com/thai-peanut-quinoa-salad-recipe/",
      nutrition: { calories: 555, protein: 23, carbs: 70, fat: 18, satFat: 2.5, fiber: 12, sodium: 420 }
    };

    const monDinner = {
      name: "Moroccan Chickpea Soup",
      ingredients: "1.75 cups soup (chickpeas, tomatoes, broth, spices; use low-sodium broth). Serve with 1 small whole-wheat roll. Cook once → eat Tuesday dinner.",
      link: "https://www.gimmesomeoven.com/moroccan-chickpea-soup/",
      nutrition: { calories: 510, protein: 20, carbs: 74, fat: 12, satFat: 1.5, fiber: 14, sodium: 780 }
    };

    const wedLunch = {
      name: "Chicken Shawarma Quinoa Bowls",
      ingredients: "4 oz cooked chicken breast, 1/3 cup dry quinoa cooked, 1 cup cucumber/tomato salad, 2 tbsp plain yogurt sauce, 1 tsp olive oil, shawarma spices. Cook once → eat Thursday lunch.",
      link: "https://peasandcrayons.com/healthy-chicken-shawarma-quinoa-bowls/",
      nutrition: { calories: 525, protein: 31, carbs: 40, fat: 17, satFat: 3.5, fiber: 5, sodium: 520 }
    };

    const wedDinner = {
      name: "Lemon Pepper Tofu and Asparagus",
      ingredients: "6 oz firm tofu, 1.5 cups asparagus, 2 tsp olive oil, lemon, black pepper, 2/3 cup cooked brown rice. Cook once → eat Thursday dinner.",
      link: "https://plantbasedrdblog.com/2022/02/lemon-pepper-tofu-and-asparagus/",
      nutrition: { calories: 540, protein: 26, carbs: 51, fat: 23, satFat: 3.5, fiber: 7, sodium: 380 }
    };

    const friLunch = {
      name: "Chicken thigh salad (meal-prep)",
      ingredients: "4 oz skinless chicken thigh meat (grilled), 2 cups mixed greens, tomato, cucumber, 1/3 cup white beans, 1/4 avocado, 1 tbsp pepitas, 2 tbsp Dijon vinaigrette (1.5 tsp olive oil + vinegar + mustard). Cook once → eat Saturday lunch.",
      nutrition: { calories: 515, protein: 36, carbs: 28, fat: 22, satFat: 3.5, fiber: 10, sodium: 520 }
    };

    const friDinner = {
      name: "Lemon Garlic Herb Grilled Salmon",
      ingredients: "5 oz salmon raw, 1.5 cups zucchini + bell pepper, 2 tsp olive oil, lemon, herbs (grill; avoid extra butter). Fresh fish at dinner. Cook once → eat Saturday dinner.",
      link: "https://www.cookingclassy.com/lemon-garlic-herb-grilled-salmon/",
      nutrition: { calories: 545, protein: 35, carbs: 14, fat: 30, satFat: 4, fiber: 4, sodium: 125 }
    };

    const sunLunch = {
      name: "Spiced Sweet Potato Lentil Soup",
      ingredients: "2 cups soup (red lentils, sweet potato; use light coconut milk or omit to keep sat fat lower). Side: 1/2 cup cucumber. Same batch feeds Monday week 2 lunch (leftover).",
      link: "https://minimalistbaker.com/1-pot-spiced-sweet-potato-lentil-soup/",
      nutrition: { calories: 510, protein: 18, carbs: 66, fat: 14, satFat: 5, fiber: 14, sodium: 620 }
    };

    const sunDinner = {
      name: "Blackened Tilapia with Avocado Cucumber Salsa",
      ingredients: "5 oz tilapia raw, avocado-cucumber salsa (1/4 avocado), 2 tsp olive oil for fish, 1/2 cup brown rice cooked, light oil spray for blackening spice. Fresh fish. Same batch feeds Monday week 2 dinner (leftover).",
      link: "https://www.bowlofdelicious.com/10-minute-blackened-tilapia-with-avocado-cucumber-salsa/",
      nutrition: { calories: 565, protein: 39, carbs: 50, fat: 20, satFat: 3.5, fiber: 6, sodium: 720 }
    };

    const weekPlan = [
      {
        day: "Monday",
        meals: [
          { type: "Breakfast", ...weekdayBreakfast },
          { type: "Lunch", ...monLunch },
          { type: "Dinner", ...monDinner },
          { type: "Snack", name: "Chocolate protein shake", ingredients: "1/2 banana, 1 tsp cocoa, 3/4 cup 1% milk, 1/2 scoop whey protein", nutrition: N.monWedSnack },
          { type: "Snack 2", name: "Cottage cheese", ingredients: "3/4 cup 1% cottage cheese, black pepper", nutrition: N.monWedSnack2 }
        ]
      },
      {
        day: "Tuesday",
        meals: [
          { type: "Breakfast", ...weekdayBreakfast },
          {
            type: "Lunch",
            name: "Thai Peanut Quinoa Salad (leftover)",
            ingredients: `${monLunch.ingredients.split(" Cook once")[0].trim()} · Leftover: same portions as Monday.`,
            link: monLunch.link,
            nutrition: monLunch.nutrition
          },
          {
            type: "Dinner",
            name: "Moroccan Chickpea Soup (leftover)",
            ingredients: `${monDinner.ingredients.split(" Cook once")[0].trim()} · Leftover: same portions as Monday.`,
            link: monDinner.link,
            nutrition: monDinner.nutrition
          },
          { type: "Snack", name: "Chocolate protein shake", ingredients: "1/2 banana, 1 tsp cocoa, 3/4 cup 1% milk, 1/2 scoop whey protein", nutrition: N.monWedSnack },
          { type: "Snack 2", name: "Cottage cheese", ingredients: "3/4 cup 1% cottage cheese, black pepper", nutrition: N.monWedSnack2 }
        ]
      },
      {
        day: "Wednesday",
        meals: [
          { type: "Breakfast", ...weekdayBreakfast },
          { type: "Lunch", ...wedLunch },
          { type: "Dinner", ...wedDinner },
          { type: "Snack", name: "Chocolate protein shake", ingredients: "1/2 banana, 1 tsp cocoa, 3/4 cup 1% milk, 1/2 scoop whey protein", nutrition: N.monWedSnack },
          { type: "Snack 2", name: "Cottage cheese", ingredients: "3/4 cup 1% cottage cheese, black pepper", nutrition: N.monWedSnack2 }
        ]
      },
      {
        day: "Thursday",
        meals: [
          { type: "Breakfast", ...weekdayBreakfast },
          {
            type: "Lunch",
            name: "Chicken Shawarma Quinoa Bowls (leftover)",
            ingredients: `${wedLunch.ingredients.split(" Cook once")[0].trim()} · Leftover: same portions as Wednesday.`,
            link: wedLunch.link,
            nutrition: wedLunch.nutrition
          },
          {
            type: "Dinner",
            name: "Lemon Pepper Tofu and Asparagus (leftover)",
            ingredients: `${wedDinner.ingredients.split(" Cook once")[0].trim()} · Leftover: same portions as Wednesday.`,
            link: wedDinner.link,
            nutrition: wedDinner.nutrition
          },
          { type: "Snack", name: "Chocolate protein shake", ingredients: "1/2 banana, 1 tsp cocoa, 3/4 cup 1% milk, 1/2 scoop whey protein", nutrition: N.monWedSnack },
          { type: "Snack 2", name: "Cottage cheese", ingredients: "3/4 cup 1% cottage cheese, black pepper", nutrition: N.monWedSnack2 }
        ]
      },
      {
        day: "Friday",
        meals: [
          { type: "Breakfast", ...weekdayBreakfast },
          { type: "Lunch", ...friLunch },
          { type: "Dinner", ...friDinner },
          { type: "Snack", name: "Protein shake (small)", ingredients: "3/4 cup 1% milk, 1/2 scoop whey protein, ice", nutrition: N.thuFriSnack },
          { type: "Snack 2", name: "Baby carrots + hummus", ingredients: "1 cup baby carrots, 3 tbsp hummus", nutrition: N.thuFriSnack2 }
        ]
      },
      {
        day: "Saturday",
        meals: [
          { type: "Breakfast", ...satEggs },
          {
            type: "Lunch",
            name: "Chicken thigh salad (leftover)",
            ingredients: `${friLunch.ingredients.split(" Cook once")[0].trim()} · Leftover: same portions as Friday.`,
            link: friLunch.link,
            nutrition: friLunch.nutrition
          },
          {
            type: "Dinner",
            name: "Lemon Garlic Herb Grilled Salmon (leftover)",
            ingredients: `${friDinner.ingredients.split(" Cook once")[0].trim()} · Leftover: same portions as Friday.`,
            link: friDinner.link,
            nutrition: friDinner.nutrition
          },
          { type: "Snack", name: "Protein shake + fruit", ingredients: "3/4 cup 1% milk, 1/2 scoop whey protein, 1/2 banana", nutrition: N.weekendSnack },
          { type: "Snack 2", name: "Trail mix + cottage cheese", ingredients: "1/4 cup lowfat cottage cheese, 1/4 cup whole-grain cereal, 2 tbsp mixed nuts, dried fruit", nutrition: N.weekendSnack2 }
        ]
      },
      {
        day: "Sunday",
        meals: [
          { type: "Breakfast", ...sunEggs },
          { type: "Lunch", ...sunLunch },
          { type: "Dinner", ...sunDinner },
          { type: "Snack", name: "Apple + peanut butter", ingredients: "1 small apple, 1 tbsp natural peanut butter", nutrition: N.sunSnack },
          { type: "Snack 2", name: "Skyr or Greek yogurt", ingredients: "3/4 cup nonfat Greek yogurt", nutrition: N.sunSnack2 }
        ]
      }
    ];

    const sumNutrition = (meals) =>
      meals.reduce(
        (acc, m) => ({
          calories: acc.calories + m.nutrition.calories,
          protein: acc.protein + m.nutrition.protein,
          carbs: acc.carbs + m.nutrition.carbs,
          fat: acc.fat + m.nutrition.fat,
          satFat: acc.satFat + m.nutrition.satFat,
          fiber: acc.fiber + m.nutrition.fiber,
          sodium: acc.sodium + m.nutrition.sodium
        }),
        { calories: 0, protein: 0, carbs: 0, fat: 0, satFat: 0, fiber: 0, sodium: 0 }
      );

    const fmtP = (x) => {
      const r = Math.round(x * 10) / 10;
      return Number.isInteger(r) ? String(r) : r.toFixed(1);
    };

    const typeIcon = {
      Breakfast: "☀️",
      Lunch: "🌿",
      Dinner: "🌙",
      Snack: "🥜",
      "Snack 2": "🫐"
    };

    const typeTags = {
      Breakfast: ["Soluble fiber", "Steady energy", "Heart healthy"],
      Lunch: ["Whole foods", "Plant protein", "Meal prep"],
      Dinner: ["Lean protein", "High fiber", "Low sat fat"],
      Snack: ["Protein boost", "Smart fats", "Blood sugar support"],
      "Snack 2": ["Lean protein", "Fiber", "Portion control"]
    };

    const shortType = {
      Monday: "Mon",
      Tuesday: "Tue",
      Wednesday: "Wed",
      Thursday: "Thu",
      Friday: "Fri",
      Saturday: "Sat",
      Sunday: "Sun"
    };

    const dayTabs = document.getElementById("dayTabs");
    const planContainer = document.getElementById("planContainer");
    const daySections = {};

    const metricTargets = {
      carbs: 275,
      fat: 78,
      satFat: 22,
      fiber: 35,
      sodium: 2300
    };

    const setActiveDay = (dayId) => {
      Object.entries(daySections).forEach(([id, section]) => {
        const isActive = id === dayId;
        section.classList.toggle("hidden", !isActive);
      });
    };

    weekPlan.forEach((entry, idx) => {
      const dayId = entry.day.toLowerCase();
      const stats = sumNutrition(entry.meals);
      const totalProtein = stats.protein;

      const tab = document.createElement("button");
      tab.className = `day-tab ${idx === 0 ? "active" : ""}`;
      tab.type = "button";
      tab.textContent = shortType[entry.day];
      tab.addEventListener("click", () => {
        document.querySelectorAll(".day-tab").forEach((el) => el.classList.remove("active"));
        tab.classList.add("active");
        setActiveDay(dayId);
      });
      dayTabs.appendChild(tab);

      const section = document.createElement("section");
      section.className = "day-section";
      section.id = dayId;
      const breakdown = {
        breakfast: entry.meals.find((meal) => meal.type === "Breakfast")?.nutrition.protein || 0,
        lunch: entry.meals.find((meal) => meal.type === "Lunch")?.nutrition.protein || 0,
        dinner: entry.meals.find((meal) => meal.type === "Dinner")?.nutrition.protein || 0,
        snack: entry.meals.find((meal) => meal.type === "Snack")?.nutrition.protein || 0,
        snack2: entry.meals.find((meal) => meal.type === "Snack 2")?.nutrition.protein || 0
      };
      const metricRows = [
        { key: "carbs", label: "Carbohydrates", unit: "g", color: "#2a7f63" },
        { key: "fat", label: "Total Fat", unit: "g", color: "#7a5a1e" },
        { key: "satFat", label: "Saturated Fat", unit: "g", color: "#d07a2f" },
        { key: "fiber", label: "Fiber", unit: "g", color: "#4e5a9a" },
        { key: "sodium", label: "Sodium", unit: "mg", color: "#8a39a9" }
      ];

      const mealsMarkup = entry.meals.map((meal) => {
        const tags = typeTags[meal.type] || ["Heart healthy", "Protein support", "Whole foods"];
        const n = meal.nutrition;
        const titleHtml = meal.link
          ? `<a href="${meal.link}" target="_blank" rel="noopener noreferrer">${meal.name}</a>`
          : `<span class="meal-title-text">${meal.name}</span>`;
        return `
        <article class="meal-card">
          <div class="meal-top">
            <div class="meal-type">${typeIcon[meal.type] || "•"} ${meal.type}</div>
            <div class="protein-pill">${fmtP(n.protein)}g protein</div>
          </div>
          <div class="meal-name">
            ${titleHtml}
          </div>
          <p class="meal-ingredients">${meal.ingredients}</p>
          <p class="meal-macros"><strong>${Math.round(n.calories)} kcal</strong> · ${fmtP(n.protein)}g protein · ${fmtP(n.carbs)}g carbs · ${fmtP(n.fat)}g fat · ${fmtP(n.satFat)}g sat. fat · ${fmtP(n.fiber)}g fiber · ${Math.round(n.sodium)}mg sodium</p>
          <div class="tags">
            ${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
        </article>
      `;
      }).join("");
      const metricsMarkup = metricRows.map((metric) => {
        const val = stats[metric.key];
        const displayVal = metric.key === "sodium" ? Math.round(val) : Math.round(val * 10) / 10;
        const pct = Math.min(100, Math.round((val / metricTargets[metric.key]) * 100));
        return `
          <div class="metric">
            <div class="metric-line"><span>${metric.label}</span><strong>${displayVal}${metric.unit}</strong></div>
            <div class="metric-bar"><span style="width:${pct}%; background:${metric.color};"></span></div>
          </div>
        `;
      }).join("");
      const satOk = stats.satFat < 15;
      const fiberOk = stats.fiber >= 25;
      const sodiumOk = stats.sodium < 2300;
      const kcalInRange = stats.calories >= 1890 && stats.calories <= 2110;
      const proteinInRange = stats.protein >= 88 && stats.protein <= 145;
      const dayNote =
        "Daily totals sum the meal rows above (same USDA-style assumptions). Lunch and dinner repeat the next calendar day when marked leftover; Sunday’s cook also supplies Monday week 2. Use nutrition labels and a scale for your exact foods.";

      section.innerHTML = `
        <h2 class="day-title">Week 1 · ${entry.day}</h2>
        <hr class="day-divider">
        ${mealsMarkup}
        <div class="nutrition-card">
          <div class="nutrition-top">
            <div class="nutrition-box">Calories <strong>${Math.round(stats.calories)}</strong></div>
            <div class="nutrition-box">Protein <strong>${fmtP(totalProtein)}g</strong></div>
          </div>
          <div class="mini-heading">Protein by meal</div>
          <div class="protein-grid">
            <div class="protein-row"><span>☀️ Breakfast</span><strong>${fmtP(breakdown.breakfast)}g</strong></div>
            <div class="protein-row"><span>🌿 Lunch</span><strong>${fmtP(breakdown.lunch)}g</strong></div>
            <div class="protein-row"><span>🌙 Dinner</span><strong>${fmtP(breakdown.dinner)}g</strong></div>
            <div class="protein-row"><span>🥜 Snack</span><strong>${fmtP(breakdown.snack)}g</strong></div>
            <div class="protein-row"><span>🫐 Snack 2</span><strong>${fmtP(breakdown.snack2)}g</strong></div>
          </div>
          ${metricsMarkup}
          <div class="badges">
            <span class="goal-badge ${kcalInRange ? "" : "warn"}">${kcalInRange ? "✓" : "!"} ~2000 kcal (${Math.round(stats.calories)} kcal)</span>
            <span class="goal-badge ${proteinInRange ? "" : "warn"}">${proteinInRange ? "✓" : "!"} ~100g protein (${fmtP(totalProtein)}g)</span>
            <span class="goal-badge ${satOk ? "" : "warn"}">${satOk ? "✓" : "!"} Sat fat &lt;15g (${fmtP(stats.satFat)}g)</span>
            <span class="goal-badge ${fiberOk ? "" : "warn"}">${fiberOk ? "✓" : "!"} Fiber ≥25g (${fmtP(stats.fiber)}g)</span>
            <span class="goal-badge ${sodiumOk ? "" : "warn"}">${sodiumOk ? "✓" : "!"} Sodium &lt;2300mg (${Math.round(stats.sodium)}mg)</span>
          </div>
          <div class="protein-note">ℹ️ ${dayNote}</div>
        </div>
        <div class="section-footer">
          Numbers are rounded estimates from typical USDA FoodData Central values for the portions listed (including added salt in broth, chili, and soy sauce where applicable). Your brands and cooking methods will differ—check labels.
        </div>
      `;

      planContainer.appendChild(section);
      daySections[dayId] = section;
    });

    setActiveDay(weekPlan[0].day.toLowerCase());
  </script>
</body>
</html>
