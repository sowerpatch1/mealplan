<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1 Cholesterol-Friendly Meal Plan</title>
  <style>
    :root {
      --forest-900: #0f3527;
      --forest-800: #144130;
      --forest-700: #1b5a42;
      --forest-600: #236a4f;
      --sage-100: #edf4ef;
      --surface: #f6f5f2;
      --card: #ffffff;
      --ink: #173126;
      --ink-soft: #4a5a52;
      --protein-bg: #1e4e92;
      --protein-text: #f5f9ff;
      --chip-bg: #f0f3f1;
      --chip-border: #d5dfd9;
      --line: #dde6e0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--surface);
      color: var(--ink);
      line-height: 1.5;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 14px 36px;
    }

    .hero {
      background: linear-gradient(160deg, var(--forest-900), var(--forest-700));
      color: #f3f7f4;
      margin: 0 -14px;
      padding: 26px 18px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .hero-eyebrow {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 3.8vw, 42px);
      line-height: 1.15;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    .hero-sub {
      margin: 10px 0 0;
      color: #dbe8e0;
      font-size: 17px;
    }

    .hero-points {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: #d5e4dc;
    }

    .week-tabs,
    .day-tabs {
      margin: 0 -14px;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .week-tabs::-webkit-scrollbar,
    .day-tabs::-webkit-scrollbar {
      display: none;
    }

    .week-tabs {
      background: var(--forest-800);
    }

    .day-tabs {
      background: var(--forest-700);
    }

    .week-tab,
    .day-tab {
      border: none;
      background: transparent;
      color: #d3e2da;
      font-size: 15px;
      padding: 13px 18px;
      white-space: nowrap;
    }

    .week-tab.active,
    .day-tab.active {
      color: #ffffff;
      border-bottom: 3px solid #9fd4b7;
      font-weight: 600;
    }

    .content {
      padding-top: 16px;
    }

    .day-section {
      margin-bottom: 24px;
    }

    .day-title {
      margin: 0 0 10px;
      font-size: 38px;
      color: #26382f;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    .day-divider {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0 0 14px;
    }

    .meal-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #e6ece8;
      border-left: 4px solid var(--forest-600);
      padding: 14px 14px 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }

    .meal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .meal-type {
      color: #6e8077;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      font-weight: 600;
    }

    .protein-pill {
      background: var(--protein-bg);
      color: var(--protein-text);
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meal-name a {
      color: #173126;
      text-decoration: none;
      font-size: 33px;
      line-height: 1.2;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 6px;
    }

    .meal-name a:hover {
      text-decoration: underline;
    }

    .meal-hint {
      margin: 0 0 10px;
      color: var(--ink-soft);
      font-size: 17px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: #3d4f46;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .section-footer {
      margin-top: 14px;
      color: #3f4f48;
      font-size: 14px;
      background: var(--sage-100);
      border: 1px solid #d8e3dc;
      border-radius: 12px;
      padding: 10px 12px;
    }

    @media (max-width: 800px) {
      .day-title {
        font-size: 34px;
      }

      .meal-name a {
        font-size: 30px;
      }
    }

    @media (max-width: 600px) {
      .day-title {
        font-size: 24px;
      }

      .meal-name a {
        font-size: 16px;
      }

      .meal-hint {
        font-size: 14px;
      }

      .hero {
        padding-top: 20px;
      }

      .hero h1 {
        font-size: 38px;
      }

      .hero-sub {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-eyebrow">4-Week Program</div>
      <h1>Week 1 Cholesterol-Friendly Meal Plan</h1>
      <p class="hero-sub">
        ~1,800-2,000 cal · 100g+ protein · Fresh fish only · Cook once, eat twice
      </p>
      <div class="hero-points">
        <span>🍲 Cook double</span>
        <span>♻️ Leftovers built in</span>
        <span>🐟 Fresh fish at dinner only</span>
      </div>
    </section>

    <nav class="week-tabs" aria-label="Week tabs">
      <button class="week-tab active" type="button">Week 1</button>
      <button class="week-tab" type="button">Week 2</button>
      <button class="week-tab" type="button">Week 3</button>
      <button class="week-tab" type="button">Week 4</button>
    </nav>

    <nav class="day-tabs" id="dayTabs" aria-label="Day tabs"></nav>

    <section class="content" id="planContainer"></section>
  </main>

  <script>
    const dailyTarget = 100;

    const weekPlan = [
      {
        day: "Monday",
        meals: [
          { type: "Breakfast", name: "Greek Yogurt Protein Bowl", protein: 30, link: "https://www.eatingwell.com/recipe/275668/greek-yogurt-with-fruit-nuts/" },
          { type: "Lunch", name: "Salmon Salad with Avocado", protein: 33, link: "https://www.eatingwell.com/recipe/269832/salmon-salad-stuffed-avocado/" },
          { type: "Dinner", name: "Lentil Soup with Veggies", protein: 26, link: "https://cookieandkate.com/best-lentil-soup-recipe/" },
          { type: "Snack", name: "Peanut Butter Energy Bites", protein: 12, link: "https://www.ambitiouskitchen.com/protein-peanut-butter-energy-bites/" }
        ]
      },
      {
        day: "Tuesday",
        meals: [
          { type: "Breakfast", name: "Overnight Oats with Chia and Protein", protein: 28, link: "https://www.eatingbirdfood.com/protein-overnight-oats/" },
          { type: "Lunch", name: "Chickpea Tuna Salad Bowl", protein: 31, link: "https://www.themediterraneandish.com/chickpea-salad/" },
          { type: "Dinner", name: "Turkey and Bean Chili", protein: 34, link: "https://www.skinnytaste.com/turkey-chili-taco-soup/" },
          { type: "Snack", name: "Chocolate Banana Protein Shake", protein: 25, link: "https://www.allrecipes.com/recipe/244959/chocolate-banana-peanut-butter-protein-shake/" }
        ]
      },
      {
        day: "Wednesday",
        meals: [
          { type: "Breakfast", name: "Egg White Veggie Scramble + Toast", protein: 29, link: "https://www.eatingwell.com/recipe/252451/veggie-egg-white-scramble/" },
          { type: "Lunch", name: "Mediterranean Quinoa Chickpea Bowl", protein: 27, link: "https://www.loveandlemons.com/quinoa-salad/" },
          { type: "Dinner", name: "Baked Cod with Roasted Broccoli", protein: 35, link: "https://www.eatingwell.com/recipe/269838/garlic-butter-roasted-salmon-with-potatoes-asparagus/" },
          { type: "Snack", name: "Cottage Cheese with Berries", protein: 14, link: "https://www.eatingwell.com/recipe/266458/cottage-cheese-bowl/" }
        ]
      },
      {
        day: "Thursday",
        meals: [
          { type: "Breakfast", name: "Protein Smoothie with Flax", protein: 32, link: "https://www.eatingwell.com/recipe/274913/strawberry-peach-smoothie/" },
          { type: "Lunch", name: "Chicken and White Bean Soup", protein: 31, link: "https://www.skinnytaste.com/chicken-and-white-bean-soup/" },
          { type: "Dinner", name: "Tofu Stir-Fry with Brown Rice", protein: 28, link: "https://minimalistbaker.com/easy-tofu-stir-fry/" },
          { type: "Snack", name: "Edamame with Sea Salt", protein: 18, link: "https://www.loveandlemons.com/edamame/" }
        ]
      },
      {
        day: "Friday",
        meals: [
          { type: "Breakfast", name: "High-Protein Oatmeal Bowl", protein: 29, link: "https://www.eatingbirdfood.com/protein-oatmeal/" },
          { type: "Lunch", name: "Turkey Hummus Veggie Wrap", protein: 30, link: "https://www.eatingwell.com/recipe/262389/turkey-veggie-wrap/" },
          { type: "Dinner", name: "Shrimp and Vegetable Quinoa Skillet", protein: 33, link: "https://www.eatingwell.com/recipe/250222/one-pot-garlicky-shrimp-broccoli/" },
          { type: "Snack", name: "Roasted Chickpeas", protein: 11, link: "https://www.loveandlemons.com/roasted-chickpeas/" }
        ]
      },
      {
        day: "Saturday",
        meals: [
          { type: "Breakfast", name: "Greek Yogurt Chia Parfait", protein: 27, link: "https://www.eatingwell.com/recipe/250216/blueberry-almond-chia-pudding/" },
          { type: "Lunch", name: "Black Bean and Sweet Potato Bowl", protein: 24, link: "https://cookieandkate.com/black-bean-sweet-potato-enchiladas/" },
          { type: "Dinner", name: "Grilled Chicken with Farro Salad", protein: 38, link: "https://www.eatingwell.com/recipe/7904853/farro-salad-with-arugula-artichokes-pistachios/" },
          { type: "Snack", name: "Protein Shake", protein: 25, link: "https://www.loveandlemons.com/protein-shake/" }
        ]
      },
      {
        day: "Sunday",
        meals: [
          { type: "Breakfast", name: "Egg and Avocado Toast", protein: 25, link: "https://www.eatingwell.com/recipe/273978/avocado-toast-with-burrata/" },
          { type: "Lunch", name: "Lentil and Tuna Salad", protein: 34, link: "https://www.themediterraneandish.com/lentil-salad-recipe/" },
          { type: "Dinner", name: "Baked Salmon and Brussels Sprouts", protein: 35, link: "https://www.eatingwell.com/recipe/274037/roasted-salmon-with-smoky-chickpeas-greens/" },
          { type: "Snack", name: "Pumpkin Seeds and Fruit", protein: 10, link: "https://www.eatingwell.com/recipe/250591/pumpkin-seed-trail-mix/" }
        ]
      }
    ];

    const typeIcon = {
      Breakfast: "☀️",
      Lunch: "🌿",
      Dinner: "🌙",
      Snack: "🥜"
    };

    const typeTags = {
      Breakfast: ["Soluble fiber", "Steady energy", "Heart healthy"],
      Lunch: ["Whole foods", "Plant protein", "Meal prep"],
      Dinner: ["Lean protein", "High fiber", "Low sat fat"],
      Snack: ["Protein boost", "Smart fats", "Blood sugar support"]
    };

    const shortType = {
      Monday: "Mon",
      Tuesday: "Tue",
      Wednesday: "Wed",
      Thursday: "Thu",
      Friday: "Fri",
      Saturday: "Sat",
      Sunday: "Sun"
    };

    const dayTabs = document.getElementById("dayTabs");
    const planContainer = document.getElementById("planContainer");

    weekPlan.forEach((entry, idx) => {
      const dayId = entry.day.toLowerCase();
      const totalProtein = entry.meals.reduce((sum, meal) => sum + meal.protein, 0);

      const tab = document.createElement("button");
      tab.className = `day-tab ${idx === 0 ? "active" : ""}`;
      tab.type = "button";
      tab.textContent = shortType[entry.day];
      tab.addEventListener("click", () => {
        document.querySelectorAll(".day-tab").forEach((el) => el.classList.remove("active"));
        tab.classList.add("active");
        const target = document.getElementById(dayId);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });
      dayTabs.appendChild(tab);

      const section = document.createElement("section");
      section.className = "day-section";
      section.id = dayId;

      const mealsMarkup = entry.meals.map((meal) => {
        const tags = typeTags[meal.type] || ["Heart healthy", "Protein support", "Whole foods"];
        return `
        <article class="meal-card">
          <div class="meal-top">
            <div class="meal-type">${typeIcon[meal.type] || "•"} ${meal.type}</div>
            <div class="protein-pill">${meal.protein}g protein</div>
          </div>
          <div class="meal-name">
            <a href="${meal.link}" target="_blank" rel="noopener noreferrer">${meal.name}</a>
          </div>
          <p class="meal-hint">Tap recipe for ingredients and directions.</p>
          <div class="tags">
            ${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
        </article>
      `;
      }).join("");

      section.innerHTML = `
        <h2 class="day-title">Week 1 · ${entry.day}</h2>
        <hr class="day-divider">
        ${mealsMarkup}
        <div class="section-footer">
          Daily protein total: <strong>${totalProtein}g / ${dailyTarget}g</strong>. Protein values are approximate.
        </div>
      `;

      planContainer.appendChild(section);
    });
  </script>
</body>
</html>
