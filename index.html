<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1 Cholesterol-Friendly Meal Plan</title>
  <style>
    :root {
      --forest-900: #0f3527;
      --forest-800: #144130;
      --forest-700: #1b5a42;
      --forest-600: #236a4f;
      --sage-100: #edf4ef;
      --surface: #f6f5f2;
      --card: #ffffff;
      --ink: #173126;
      --ink-soft: #4a5a52;
      --protein-bg: #1e4e92;
      --protein-text: #f5f9ff;
      --chip-bg: #f0f3f1;
      --chip-border: #d5dfd9;
      --line: #dde6e0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--surface);
      color: var(--ink);
      line-height: 1.5;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 14px 36px;
    }

    .hero {
      background: linear-gradient(160deg, var(--forest-900), var(--forest-700));
      color: #f3f7f4;
      margin: 0 -14px;
      padding: 26px 18px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .hero-eyebrow {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 3.8vw, 42px);
      line-height: 1.15;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    .hero-sub {
      margin: 10px 0 0;
      color: #dbe8e0;
      font-size: 17px;
    }

    .hero-points {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: #d5e4dc;
    }

    .week-tabs,
    .day-tabs {
      margin: 0 -14px;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .week-tabs::-webkit-scrollbar,
    .day-tabs::-webkit-scrollbar {
      display: none;
    }

    .week-tabs {
      background: var(--forest-800);
    }

    .day-tabs {
      background: var(--forest-700);
    }

    .week-tab,
    .day-tab {
      border: none;
      background: transparent;
      color: #d3e2da;
      font-size: 15px;
      padding: 13px 18px;
      white-space: nowrap;
    }

    .week-tab.active,
    .day-tab.active {
      color: #ffffff;
      border-bottom: 3px solid #9fd4b7;
      font-weight: 600;
    }

    .content {
      padding-top: 16px;
    }

    .day-section {
      margin-bottom: 24px;
    }

    .day-section.hidden {
      display: none;
    }

    .day-title {
      margin: 0 0 10px;
      font-size: 38px;
      color: #26382f;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    .day-divider {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0 0 14px;
    }

    .meal-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #e6ece8;
      border-left: 4px solid var(--forest-600);
      padding: 14px 14px 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }

    .meal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .meal-type {
      color: #6e8077;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      font-weight: 600;
    }

    .protein-pill {
      background: var(--protein-bg);
      color: var(--protein-text);
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meal-name a {
      color: #173126;
      text-decoration: none;
      font-size: 33px;
      line-height: 1.2;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 6px;
    }

    .meal-name a:hover {
      text-decoration: underline;
    }

    .meal-hint {
      margin: 0 0 10px;
      color: var(--ink-soft);
      font-size: 17px;
    }

    .meal-ingredients {
      margin: 0 0 10px;
      color: #5a6a63;
      font-size: 13px;
      text-transform: lowercase;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: #3d4f46;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .section-footer {
      margin-top: 14px;
      color: #3f4f48;
      font-size: 14px;
      background: var(--sage-100);
      border: 1px solid #d8e3dc;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .nutrition-card {
      margin-top: 14px;
      background: #ffffff;
      border: 1px solid #e2e8e4;
      border-radius: 14px;
      padding: 12px;
    }

    .nutrition-top {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .nutrition-box {
      background: #f5f8f6;
      border: 1px solid #e3ebe6;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      color: #587066;
    }

    .nutrition-box strong {
      float: right;
      color: #213a30;
      font-size: 26px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1;
    }

    .mini-heading {
      margin: 10px 0 7px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #587066;
      font-weight: 700;
    }

    .protein-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .protein-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid #e3ebe6;
      background: #f8faf9;
      border-radius: 9px;
      padding: 6px 8px;
      font-size: 14px;
      color: #3b5148;
    }

    .metric {
      margin-bottom: 8px;
    }

    .metric-line {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #33453d;
      margin-bottom: 3px;
    }

    .metric-bar {
      height: 7px;
      background: #e4e7e5;
      border-radius: 999px;
      overflow: hidden;
    }

    .metric-bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .badges {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .goal-badge {
      border: 1px solid #d9e4dd;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 13px;
      color: #335047;
      background: #f6faf7;
    }

    .goal-badge.warn {
      border-color: #e8d8bf;
      background: #fff7ea;
      color: #7d5b2a;
    }

    .protein-note {
      border: 1px solid #eadfc9;
      background: #fffbf1;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: #5b4a2f;
    }

    @media (max-width: 800px) {
      .day-title {
        font-size: 34px;
      }

      .meal-name a {
        font-size: 30px;
      }
    }

    @media (max-width: 600px) {
      .day-title {
        font-size: 24px;
      }

      .meal-name a {
        font-size: 16px;
      }

      .meal-hint {
        font-size: 14px;
      }

      .meal-ingredients {
        font-size: 12px;
      }

      .hero {
        padding-top: 20px;
      }

      .hero h1 {
        font-size: 38px;
      }

      .hero-sub {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-eyebrow">4-Week Program</div>
      <h1>Week 1 Cholesterol-Friendly Meal Plan</h1>
      <p class="hero-sub">
        ~1,800-2,000 cal · 100g+ protein · Fresh fish only · Cook once, eat twice
      </p>
      <div class="hero-points">
        <span>🍲 Cook double</span>
        <span>♻️ Leftovers built in</span>
        <span>🐟 Fresh fish at dinner only</span>
      </div>
    </section>

    <nav class="week-tabs" aria-label="Week tabs">
      <button class="week-tab active" type="button">Week 1</button>
      <button class="week-tab" type="button">Week 2</button>
      <button class="week-tab" type="button">Week 3</button>
      <button class="week-tab" type="button">Week 4</button>
    </nav>

    <nav class="day-tabs" id="dayTabs" aria-label="Day tabs"></nav>

    <section class="content" id="planContainer"></section>
  </main>

  <script>
    const dailyTarget = 100;

    const weekPlan = [
      {
        day: "Monday",
        meals: [
          { type: "Breakfast", name: "Greek Yogurt Protein Bowl", ingredients: "greek yogurt, berries, chia, walnuts", protein: 30, link: "https://www.eatingwell.com/recipe/275668/greek-yogurt-with-fruit-nuts/" },
          { type: "Lunch", name: "Salmon Salad with Avocado", ingredients: "salmon, avocado, greens, cucumber", protein: 33, link: "https://www.eatingwell.com/recipe/269832/salmon-salad-stuffed-avocado/" },
          { type: "Dinner", name: "Lentil Soup with Veggies", ingredients: "lentils, carrots, celery, onion", protein: 26, link: "https://cookieandkate.com/best-lentil-soup-recipe/" },
          { type: "Snack", name: "Peanut Butter Energy Bites", ingredients: "oats, peanut butter, flax, honey", protein: 12, link: "https://www.ambitiouskitchen.com/protein-peanut-butter-energy-bites/" }
        ]
      },
      {
        day: "Tuesday",
        meals: [
          { type: "Breakfast", name: "Overnight Oats with Chia and Protein", ingredients: "rolled oats, chia, milk, protein powder", protein: 28, link: "https://www.eatingbirdfood.com/protein-overnight-oats/" },
          { type: "Lunch", name: "Chickpea Tuna Salad Bowl", ingredients: "chickpeas, tuna, tomato, olive oil", protein: 31, link: "https://www.themediterraneandish.com/chickpea-salad/" },
          { type: "Dinner", name: "Turkey and Bean Chili", ingredients: "ground turkey, beans, tomato, peppers", protein: 34, link: "https://www.skinnytaste.com/turkey-chili-taco-soup/" },
          { type: "Snack", name: "Chocolate Banana Protein Shake", ingredients: "banana, cocoa, milk, protein powder", protein: 25, link: "https://www.allrecipes.com/recipe/244959/chocolate-banana-peanut-butter-protein-shake/" }
        ]
      },
      {
        day: "Wednesday",
        meals: [
          { type: "Breakfast", name: "Egg White Veggie Scramble + Toast", ingredients: "egg whites, spinach, tomato, whole grain toast", protein: 29, link: "https://www.eatingwell.com/recipe/252451/veggie-egg-white-scramble/" },
          { type: "Lunch", name: "Mediterranean Quinoa Chickpea Bowl", ingredients: "quinoa, chickpeas, cucumber, lemon", protein: 27, link: "https://www.loveandlemons.com/quinoa-salad/" },
          { type: "Dinner", name: "Baked Cod with Roasted Broccoli", ingredients: "cod, broccoli, garlic, olive oil", protein: 35, link: "https://www.eatingwell.com/recipe/269838/garlic-butter-roasted-salmon-with-potatoes-asparagus/" },
          { type: "Snack", name: "Cottage Cheese with Berries", ingredients: "cottage cheese, berries, cinnamon", protein: 14, link: "https://www.eatingwell.com/recipe/266458/cottage-cheese-bowl/" }
        ]
      },
      {
        day: "Thursday",
        meals: [
          { type: "Breakfast", name: "Protein Smoothie with Flax", ingredients: "berries, spinach, flax, protein powder", protein: 32, link: "https://www.eatingwell.com/recipe/274913/strawberry-peach-smoothie/" },
          { type: "Lunch", name: "Chicken and White Bean Soup", ingredients: "chicken breast, white beans, kale, broth", protein: 31, link: "https://www.skinnytaste.com/chicken-and-white-bean-soup/" },
          { type: "Dinner", name: "Tofu Stir-Fry with Brown Rice", ingredients: "tofu, broccoli, brown rice, tamari", protein: 28, link: "https://minimalistbaker.com/easy-tofu-stir-fry/" },
          { type: "Snack", name: "Edamame with Sea Salt", ingredients: "edamame, sea salt, lemon", protein: 18, link: "https://www.loveandlemons.com/edamame/" }
        ]
      },
      {
        day: "Friday",
        meals: [
          { type: "Breakfast", name: "High-Protein Oatmeal Bowl", ingredients: "oats, chia, milk, greek yogurt", protein: 29, link: "https://www.eatingbirdfood.com/protein-oatmeal/" },
          { type: "Lunch", name: "Turkey Hummus Veggie Wrap", ingredients: "turkey, hummus, spinach, whole wheat wrap", protein: 30, link: "https://www.eatingwell.com/recipe/262389/turkey-veggie-wrap/" },
          { type: "Dinner", name: "Shrimp and Vegetable Quinoa Skillet", ingredients: "shrimp, quinoa, zucchini, garlic", protein: 33, link: "https://www.eatingwell.com/recipe/250222/one-pot-garlicky-shrimp-broccoli/" },
          { type: "Snack", name: "Roasted Chickpeas", ingredients: "chickpeas, paprika, olive oil", protein: 11, link: "https://www.loveandlemons.com/roasted-chickpeas/" }
        ]
      },
      {
        day: "Saturday",
        meals: [
          { type: "Breakfast", name: "Greek Yogurt Chia Parfait", ingredients: "greek yogurt, chia, berries, almonds", protein: 27, link: "https://www.eatingwell.com/recipe/250216/blueberry-almond-chia-pudding/" },
          { type: "Lunch", name: "Black Bean and Sweet Potato Bowl", ingredients: "black beans, sweet potato, greens, avocado", protein: 24, link: "https://cookieandkate.com/black-bean-sweet-potato-enchiladas/" },
          { type: "Dinner", name: "Grilled Chicken with Farro Salad", ingredients: "chicken breast, farro, arugula, pistachio", protein: 38, link: "https://www.eatingwell.com/recipe/7904853/farro-salad-with-arugula-artichokes-pistachios/" },
          { type: "Snack", name: "Protein Shake", ingredients: "milk, banana, protein powder, cocoa", protein: 25, link: "https://www.loveandlemons.com/protein-shake/" }
        ]
      },
      {
        day: "Sunday",
        meals: [
          { type: "Breakfast", name: "Egg and Avocado Toast", ingredients: "eggs, avocado, whole grain bread, tomato", protein: 25, link: "https://www.eatingwell.com/recipe/273978/avocado-toast-with-burrata/" },
          { type: "Lunch", name: "Lentil and Tuna Salad", ingredients: "lentils, tuna, cucumber, lemon", protein: 34, link: "https://www.themediterraneandish.com/lentil-salad-recipe/" },
          { type: "Dinner", name: "Baked Salmon and Brussels Sprouts", ingredients: "salmon, brussels sprouts, garlic, olive oil", protein: 35, link: "https://www.eatingwell.com/recipe/274037/roasted-salmon-with-smoky-chickpeas-greens/" },
          { type: "Snack", name: "Pumpkin Seeds and Fruit", ingredients: "pumpkin seeds, apple slices, cinnamon", protein: 10, link: "https://www.eatingwell.com/recipe/250591/pumpkin-seed-trail-mix/" }
        ]
      }
    ];

    const typeIcon = {
      Breakfast: "☀️",
      Lunch: "🌿",
      Dinner: "🌙",
      Snack: "🥜"
    };

    const typeTags = {
      Breakfast: ["Soluble fiber", "Steady energy", "Heart healthy"],
      Lunch: ["Whole foods", "Plant protein", "Meal prep"],
      Dinner: ["Lean protein", "High fiber", "Low sat fat"],
      Snack: ["Protein boost", "Smart fats", "Blood sugar support"]
    };

    const shortType = {
      Monday: "Mon",
      Tuesday: "Tue",
      Wednesday: "Wed",
      Thursday: "Thu",
      Friday: "Fri",
      Saturday: "Sat",
      Sunday: "Sun"
    };

    const dayTabs = document.getElementById("dayTabs");
    const planContainer = document.getElementById("planContainer");
    const daySections = {};
    const dayNutrition = {
      Monday: { calories: 1820, carbs: 186, fat: 63, satFat: 13, fiber: 36, sodium: 1480 },
      Tuesday: { calories: 1950, carbs: 178, fat: 61, satFat: 14, fiber: 33, sodium: 1540 },
      Wednesday: { calories: 1880, carbs: 172, fat: 59, satFat: 12, fiber: 35, sodium: 1460 },
      Thursday: { calories: 1910, carbs: 182, fat: 58, satFat: 13, fiber: 34, sodium: 1520 },
      Friday: { calories: 1860, carbs: 176, fat: 60, satFat: 14, fiber: 32, sodium: 1490 },
      Saturday: { calories: 1980, carbs: 190, fat: 65, satFat: 15, fiber: 37, sodium: 1580 },
      Sunday: { calories: 1790, carbs: 170, fat: 57, satFat: 12, fiber: 34, sodium: 1430 }
    };

    const metricTargets = {
      carbs: 220,
      fat: 80,
      satFat: 20,
      fiber: 40,
      sodium: 2000
    };

    const setActiveDay = (dayId) => {
      Object.entries(daySections).forEach(([id, section]) => {
        const isActive = id === dayId;
        section.classList.toggle("hidden", !isActive);
      });
    };

    weekPlan.forEach((entry, idx) => {
      const dayId = entry.day.toLowerCase();
      const totalProtein = entry.meals.reduce((sum, meal) => sum + meal.protein, 0);

      const tab = document.createElement("button");
      tab.className = `day-tab ${idx === 0 ? "active" : ""}`;
      tab.type = "button";
      tab.textContent = shortType[entry.day];
      tab.addEventListener("click", () => {
        document.querySelectorAll(".day-tab").forEach((el) => el.classList.remove("active"));
        tab.classList.add("active");
        setActiveDay(dayId);
      });
      dayTabs.appendChild(tab);

      const section = document.createElement("section");
      section.className = "day-section";
      section.id = dayId;
      const breakdown = {
        breakfast: entry.meals.find((meal) => meal.type === "Breakfast")?.protein || 0,
        lunch: entry.meals.find((meal) => meal.type === "Lunch")?.protein || 0,
        dinner: entry.meals.find((meal) => meal.type === "Dinner")?.protein || 0,
        snack: entry.meals.find((meal) => meal.type === "Snack")?.protein || 0
      };
      const stats = dayNutrition[entry.day];
      const metricRows = [
        { key: "carbs", label: "Carbohydrates", unit: "g", color: "#2a7f63" },
        { key: "fat", label: "Total Fat", unit: "g", color: "#7a5a1e" },
        { key: "satFat", label: "Saturated Fat", unit: "g", color: "#d07a2f" },
        { key: "fiber", label: "Fiber", unit: "g", color: "#4e5a9a" },
        { key: "sodium", label: "Sodium", unit: "mg", color: "#8a39a9" }
      ];

      const mealsMarkup = entry.meals.map((meal) => {
        const tags = typeTags[meal.type] || ["Heart healthy", "Protein support", "Whole foods"];
        return `
        <article class="meal-card">
          <div class="meal-top">
            <div class="meal-type">${typeIcon[meal.type] || "•"} ${meal.type}</div>
            <div class="protein-pill">${meal.protein}g protein</div>
          </div>
          <div class="meal-name">
            <a href="${meal.link}" target="_blank" rel="noopener noreferrer">${meal.name}</a>
          </div>
          <p class="meal-ingredients">${meal.ingredients}</p>
          <div class="tags">
            ${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
        </article>
      `;
      }).join("");
      const metricsMarkup = metricRows.map((metric) => {
        const val = stats[metric.key];
        const pct = Math.min(100, Math.round((val / metricTargets[metric.key]) * 100));
        return `
          <div class="metric">
            <div class="metric-line"><span>${metric.label}</span><strong>${val}${metric.unit}</strong></div>
            <div class="metric-bar"><span style="width:${pct}%; background:${metric.color};"></span></div>
          </div>
        `;
      }).join("");
      const proteinOk = totalProtein >= 100;
      const satOk = stats.satFat < 15;
      const fiberOk = stats.fiber >= 25;
      const sodiumOk = stats.sodium < 2000;
      const proteinNote = proteinOk
        ? "Protein target met for today. Great balance for satiety and muscle support."
        : `Today lands around ${totalProtein}g, a bit short of 100g. Add greek yogurt, cottage cheese, or an extra egg to close the gap.`;

      section.innerHTML = `
        <h2 class="day-title">Week 1 · ${entry.day}</h2>
        <hr class="day-divider">
        ${mealsMarkup}
        <div class="nutrition-card">
          <div class="nutrition-top">
            <div class="nutrition-box">Calories <strong>${stats.calories}</strong></div>
            <div class="nutrition-box">Protein <strong>${totalProtein}g</strong></div>
          </div>
          <div class="mini-heading">Protein by meal</div>
          <div class="protein-grid">
            <div class="protein-row"><span>☀️ Breakfast</span><strong>${breakdown.breakfast}g</strong></div>
            <div class="protein-row"><span>🌿 Lunch</span><strong>${breakdown.lunch}g</strong></div>
            <div class="protein-row"><span>🌙 Dinner</span><strong>${breakdown.dinner}g</strong></div>
            <div class="protein-row"><span>🥜 Snack</span><strong>${breakdown.snack}g</strong></div>
          </div>
          ${metricsMarkup}
          <div class="badges">
            <span class="goal-badge ${proteinOk ? "" : "warn"}">${proteinOk ? "✓" : "!"} Protein ${proteinOk ? "≥100g" : "<100g"}</span>
            <span class="goal-badge ${satOk ? "" : "warn"}">${satOk ? "✓" : "!"} Sat fat &lt;15g</span>
            <span class="goal-badge ${fiberOk ? "" : "warn"}">${fiberOk ? "✓" : "!"} Fiber ≥25g</span>
            <span class="goal-badge ${sodiumOk ? "" : "warn"}">${sodiumOk ? "✓" : "!"} Sodium &lt;2000mg</span>
          </div>
          <div class="protein-note">⚠️ Protein note: ${proteinNote}</div>
        </div>
        <div class="section-footer">
          Protein estimates are based on standard portions and should be adjusted to your real serving sizes.
        </div>
      `;

      planContainer.appendChild(section);
      daySections[dayId] = section;
    });

    setActiveDay(weekPlan[0].day.toLowerCase());
  </script>
</body>
</html>
